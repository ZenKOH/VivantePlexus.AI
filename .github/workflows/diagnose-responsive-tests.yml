name: Diagnose responsive landing tests

on:
  push:
    branches: [agent/streamline-responsive-landing]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/streamline-responsive-landing
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - name: Capture tests
        run: npm test > ci-test-output.txt 2>&1 || true
      - name: Commit diagnostic output
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ci-test-output.txt
          git commit -m 'Capture responsive test diagnostics [skip ci]' || exit 0
          git push origin HEAD:agent/streamline-responsive-landing
