name: Repair welcome asset delivery

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Cache-bust and make overview landing deterministic
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          text = text.replace('20260713-9', '20260714-2')
          index.write_text(text, encoding='utf-8')

          loader = Path('equipment-upgrade.js')
          text = loader.read_text(encoding='utf-8')
          text = text.replace('const version = "20260714-1";', 'const version = "20260714-2";')
          text = text.replace(
              '  let dismissed = false;\n  try { dismissed = sessionStorage.getItem("vivantePlexus.welcomeDismissed.v1") === "1"; } catch { /* no-op */ }\n\n  if (hash === "#overview" && !dismissed) {',
              '  if (hash === "#overview") {'
          )
          loader.write_text(text, encoding='utf-8')

          landing = Path('welcome-landing.js')
          text = landing.read_text(encoding='utf-8')
          text = text.replace('vivantePlexus.welcomeDismissed.v1', 'vivantePlexus.welcomeDismissed.v2')
          text = text.replace(
              'let dismissed=false;try{dismissed=sessionStorage.getItem(KEY)==="1";}catch{}const hash=location.hash||"#overview";if(hash==="#overview"&&!dismissed)show({instant:true,focus:false});else hide(false);',
              'const hash=location.hash||"#overview";if(hash==="#overview")show({instant:true,focus:false});else hide(false);'
          )
          landing.write_text(text, encoding='utf-8')
          PY
      - name: Validate repair
        run: |
          node --check equipment-upgrade.js
          node --check welcome-landing.js
          grep -q 'equipment-upgrade.js?v=20260714-2' index.html
          grep -q 'const version = "20260714-2"' equipment-upgrade.js
          grep -q 'if(hash==="#overview")show' welcome-landing.js
      - name: Commit repaired delivery
        run: |
          if git diff --quiet; then
            echo 'No repair required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html equipment-upgrade.js welcome-landing.js
          git commit -m 'Fix welcome landing delivery [skip ci]'
          git push origin HEAD:main
