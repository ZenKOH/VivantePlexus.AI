name: Validate static clinical prototype

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Check application JavaScript
        run: npm run check
      - name: Check welcome JavaScript
        run: node --check welcome-landing.js
